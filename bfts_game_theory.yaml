# Copy most settings from original but with modifications
data_dir: "data"
preprocess_data: False

# Define the research goal
goal: "Develop and analyze game-theoretic routing strategies for Mixture-of-Experts models that are robust to adversarial perturbations"
eval: "adversarial_robustness"

log_dir: logs_game_theory
workspace_dir: workspaces_game_theory

copy_data: True
exp_name: game_theoretic_moe_exploration

exec:
  timeout: 3600
  agent_file_name: runfile.py
  format_tb_ipython: False

generate_report: True
report:
  model: gpt-4o-2024-11-20
  temp: 1.0

experiment:
  num_syn_datasets: 1

agent:
  type: parallel
  num_workers: 4
  stages:
    stage1_max_iters: 20  # Initial exploration
    stage2_max_iters: 15  # Refinement
    stage3_max_iters: 15  # Robustness testing
    stage4_max_iters: 20  # Final optimization
  steps: 5
  k_fold_validation: 1
  multi_seed_eval:
    num_seeds: 3
  expose_prediction: False
  data_preview: False

  code:
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temp: 1.0
    max_tokens: 12000

  feedback:
    model: gpt-4o-2024-11-20
    temp: 0.5
    max_tokens: 8192

  vlm_feedback:
    model: gpt-4o-2024-11-20
    temp: 0.5
    max_tokens: null

  search:
    max_debug_depth: 3
    debug_prob: 0.5
    num_drafts: 3
